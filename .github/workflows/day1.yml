name: Run Day 1

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 1 * *" # 01:00 WIB (UTC+7)

jobs:
  day1:
    runs-on: ubuntu-latest
    env:
      GSHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run only on day 1 WIB
        run: |
          if [ "$(TZ='Asia/Jakarta' date +'%d')" != "01" ]; then
            echo "Bukan tanggal 1 WIB, skip."
            exit 0
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Day 1
        working-directory: pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline
        run: python -m jobs.day1
