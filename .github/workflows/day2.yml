name: Run Day 2

on:
  workflow_dispatch:   # bisa klik manual di GitHub
  # schedule:         # optional kalau mau auto jalan
  #   - cron: "0 3 2 * *"   # contoh tiap tanggal 2 jam 10 WIB

jobs:
  run-day2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set env variables
        run: echo "METABASE_TOKEN=${{ secrets.METABASE_TOKEN }}" >> $GITHUB_ENV

      - name: Run day2 script
        run: python day2.py
